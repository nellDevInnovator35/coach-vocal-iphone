# XcodeGen project definition.
# Génère CoachVocal.xcodeproj à partir des sources Swift.
#
# Installation de XcodeGen (une seule fois) :
#   brew install xcodegen
# Génération du projet :
#   cd coach-mobilr-ios && xcodegen generate
# Puis ouvrir CoachVocal.xcodeproj dans Xcode.

name: CoachVocal
options:
  bundleIdPrefix: com.nell
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""            # ← Renseigné automatiquement par Xcode (ton Apple ID)
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO

targets:
  CoachVocal:
    type: application
    platform: iOS
    sources:
      - path: CoachVocal
        excludes:
          - "Secrets.example.swift"   # modèle only — ne pas compiler (éviterait un doublon de `enum Secrets`)
    info:
      path: CoachVocal/Info.plist
      properties:
        CFBundleDisplayName: Coach Vocal
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "Coach Vocal utilise le micro pour enregistrer et transcrire ta voix."
        NSSpeechRecognitionUsageDescription: "Coach Vocal transcrit ta voix en texte en temps réel."
        NSPhotoLibraryUsageDescription: "Coach Vocal permet de joindre des photos et vidéos à tes projets."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nell.coach
        TARGETED_DEVICE_FAMILY: "1,2"
